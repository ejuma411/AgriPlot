{% extends "auth/auth_base.html" %}
{% block title %}Confirm Reset{% endblock %}

{% block content %}
<p class="auth-kicker">Security Check</p>
<h2 class="auth-title">Confirm Password Reset</h2>
<p class="auth-subtitle">We received a reset request for {{ masked_email }}.</p>

<form method="POST" class="auth-form">
    {% csrf_token %}
    <button type="submit" name="action" value="confirm" class="auth-btn">Yes, Reset My Password</button>
    <button type="submit" name="action" value="cancel" class="auth-btn auth-btn--danger">No, Cancel</button>
</form>

<div class="portal-links">
    <a href="{% url 'listings:contact_support' %}">Need help? Contact Support</a>
</div>
{% endblock %}
