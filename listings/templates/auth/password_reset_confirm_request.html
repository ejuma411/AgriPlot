{% extends "auth/auth_base.html" %}
{% block title %}Confirm Reset{% endblock %}

{% block content %}
<h2>Confirm Password Reset</h2>
<p class="text-muted">We received a reset request for {{ masked_email }}.</p>

<form method="POST" class="portal-form">
    {% csrf_token %}
    <button type="submit" name="action" value="confirm" class="portal-btn">Yes, Reset My Password</button>
    <button type="submit" name="action" value="cancel" class="portal-btn" style="background:#dc3545;">No, Cancel</button>
</form>

<div class="portal-links">
    <a href="{% url 'listings:contact_support' %}">Need help? Contact Support</a>
</div>
{% endblock %}
