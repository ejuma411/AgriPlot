{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgriPlot Auth{% endblock %}</title>
    <link rel="icon" href="{% static 'images/agriplot-logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body class="auth-body">
    <div class="portal-wrapper">
        <div class="portal-card">
            <div class="portal-logo">
                <img src="{% static 'images/agriplot-logo.png' %}" alt="AgriPlot" class="portal-logo-img" />
            </div>
            <hr class="portal-divider" />

            {% if messages %}
                {% for message in messages %}
                    <div class="portal-alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}

            <div class="portal-links">
                <a href="{% url 'login' %}">Back to Login</a>
            </div>

            <div class="portal-footer">© AgriPlot Connect</div>
        </div>
    </div>

    <style>
        body.auth-body { background: #f5f5f5; }
        .portal-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .portal-card {
            width: 420px;
            background: #fff;
            border: 1px solid #ddd;
            padding: 24px 26px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .portal-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .portal-logo-img {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }
        .portal-divider { margin: 10px 0 18px; }
        .portal-alert {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 8px 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .portal-form label {
            display: block;
            margin: 10px 0 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .portal-form input, .portal-form select, .portal-form textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 2px;
        }
        .portal-btn {
            width: 100%;
            background: #1f8b4c;
            color: #fff;
            border: none;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        .portal-links {
            margin-top: 10px;
            text-align: center;
            font-size: 0.85rem;
        }
        .portal-links a { color: #0066cc; text-decoration: none; }
        .portal-footer {
            margin-top: 14px;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
        }
        .portal-signup {
            margin-top: 12px;
            text-align: center;
            font-size: 0.85rem;
        }
        .portal-signup-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 6px;
        }
        .portal-signup-links a {
            color: #1f8b4c;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</body>
</html>
