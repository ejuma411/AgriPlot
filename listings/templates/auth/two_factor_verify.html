{% extends "auth/auth_base.html" %}
{% block title %}Verify 2FA — AgriPlot Connect{% endblock %}

{% block content %}
<p class="auth-kicker">Step Up</p>
<h2 class="auth-title">Two-Factor Verification</h2>
<p class="auth-subtitle">Choose a method and enter the verification code.</p>

<div class="auth-grid">
    <div class="auth-panel-card">
        <h3 class="auth-panel-title">Verify</h3>
        <form method="POST" class="auth-form">
            {% csrf_token %}
            <label>Method</label>
            <select name="method" required>
                {% if 'totp' in available_methods %}
                    <option value="totp">Authenticator App (TOTP)</option>
                {% endif %}
                {% if 'email' in available_methods %}
                    <option value="email">Email OTP ({{ email }})</option>
                {% endif %}
                {% if 'sms' in available_methods %}
                    <option value="sms">SMS OTP ({{ phone }})</option>
                {% endif %}
                {% if 'backup' in available_methods %}
                    <option value="backup">Backup Code</option>
                {% endif %}
            </select>

            <label>Code</label>
            {{ form.code }}

            <button type="submit" class="auth-btn">Verify</button>
        </form>
    </div>

    <div class="auth-panel-card">
        <h3 class="auth-panel-title">Send a New Code</h3>
        <form method="POST" class="auth-form">
            {% csrf_token %}
            <input type="hidden" name="send_code" value="1">
            <label>Send OTP To</label>
            <select name="method" required>
                {% if 'email' in available_methods %}
                    <option value="email">Email OTP ({{ email }})</option>
                {% endif %}
                {% if 'sms' in available_methods %}
                    <option value="sms">SMS OTP ({{ phone }})</option>
                {% endif %}
            </select>
            <button type="submit" class="auth-btn auth-btn--accent">Send Code</button>
        </form>
    </div>
</div>
{% endblock %}
