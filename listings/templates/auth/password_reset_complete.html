{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - AgriPlot Connect</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-left">
                <div class="brand-content">
                    <div class="brand-icon">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <h1 class="brand-title">AgriPlot</h1>
                    <p class="brand-tagline">Password reset successful</p>
                </div>
            </div>

            <div class="auth-right">
                <div class="success-card">
                    <div class="success-icon success-large">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    
                    <h2>Password Reset Complete! 🎉</h2>
                    
                    <div class="success-message">
                        <p>Your password has been successfully reset.</p>
                        <p>You can now log in with your new password.</p>
                    </div>

                    <div class="action-buttons">
                        <a href="{% url 'login' %}" class="btn-primary">
                            <i class="fas fa-sign-in-alt"></i>
                            Proceed to Login
                        </a>
                    </div>

                    <div class="security-note">
                        <i class="fas fa-shield-alt"></i>
                        <small>For security, please use a unique password and enable 2FA.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
