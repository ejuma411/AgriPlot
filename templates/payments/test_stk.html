{% extends "base.html" %}

{% block title %}Test STK Push{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4>Test M-Pesa STK Push</h4>
                </div>
                <div class="card-body">
                    <form method="post" id="testForm">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Phone Number</label>
                            <input type="tel" name="phone" class="form-control" value="254716296208" required>
                            <small class="text-muted">Format: 254XXXXXXXXX (without +)</small>
                        </div>
                        <div class="mb-3">
                            <label>Amount (KES)</label>
                            <input type="number" name="amount" class="form-control" value="10" min="1" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                            Send STK Push
                        </button>
                    </form>
                    
                    <div id="result" class="mt-4" style="display: none;">
                        <div class="alert" id="resultMessage"></div>
                        <pre id="resultData" style="background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto;"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('testForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    const resultDiv = document.getElementById('result');
    const resultMessage = document.getElementById('resultMessage');
    const resultData = document.getElementById('resultData');
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
    
    const formData = new FormData(this);
    
    try {
        const response = await fetch(window.location.href, {
            method: 'POST',
            body: formData
        });
        const rawText = await response.text();
        let data = null;
        try {
            data = JSON.parse(rawText);
        } catch (parseError) {
            throw new Error(`Server returned a non-JSON response (${response.status}).`);
        }
        
        resultDiv.style.display = 'block';
        
        if (data.success) {
            resultMessage.className = 'alert alert-success';
            resultMessage.innerHTML = '<i class="fas fa-check-circle"></i> ' + data.message;
        } else {
            resultMessage.className = 'alert alert-danger';
            resultMessage.innerHTML = '<i class="fas fa-exclamation-circle"></i> Error: ' + data.error;
        }
        
        resultData.textContent = JSON.stringify(data, null, 2);
        
    } catch (error) {
        resultDiv.style.display = 'block';
        resultMessage.className = 'alert alert-danger';
        resultMessage.innerHTML = '<i class="fas fa-exclamation-circle"></i> Request failed: ' + error.message;
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Send STK Push';
    }
});
</script>
{% endblock %}
