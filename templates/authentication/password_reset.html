{% extends "authentication/auth_base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<p class="auth-kicker">Password Help</p>
<h2 class="auth-title">Reset Password</h2>
<p class="auth-subtitle">Enter your email to start the reset process.</p>

<form method="POST" class="auth-form">
    {% csrf_token %}
    <label for="id_email">Email Address</label>
    <input type="email" name="email" id="id_email" required autofocus>

    <button type="submit" class="auth-btn">Continue</button>
</form>

{% endblock %}
