<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #069132 0%, #047a29 100%); color: white; padding: 24px; text-align: center; }
        .content { background: #f9f9f9; padding: 24px; }
        .button { display: inline-block; padding: 12px 24px; background: #069132; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Role Approved</h2>
    </div>
    <div class="content">
        <p>Hello {{ user|display_name }},</p>
        <p>Your request has been approved. You are now verified as:</p>
        <p><strong>{{ role }}</strong></p>
        <div style="text-align: center; margin: 24px 0;">
            <a href="{{ login_url }}" class="button">Log In</a>
        </div>
        <p>Thank you for using AgriPlot.</p>
    </div>
</body>
</html>
