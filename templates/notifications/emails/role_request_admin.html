<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #069132 0%, #047a29 100%); color: white; padding: 24px; text-align: center; }
        .content { background: #f9f9f9; padding: 24px; }
        .button { display: inline-block; padding: 10px 18px; background: #069132; color: white; text-decoration: none; border-radius: 5px; }
        .footer { text-align: center; padding: 16px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>New Role Request</h2>
    </div>
    <div class="content">
        <p>Hello {{ admin|display_name }},</p>
        <p>{{ user|display_name }} has submitted a request for <strong>{{ role }}</strong>.</p>
        {% if details %}
            <p><strong>Submitted details:</strong></p>
            <pre style="white-space: pre-wrap;">{{ details }}</pre>
        {% endif %}
        <div style="text-align:center; margin-top: 16px;">
            <a href="{{ review_url }}" class="button">Review Request</a>
        </div>
    </div>
    <div class="footer">
        <p>© {% now "Y" %} AgriPlot Connect. All rights reserved.</p>
    </div>
</body>
</html>
