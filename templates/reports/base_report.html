{% extends "base.html" %}

{% block full_width_content %}
<main class="report-shell">
    <div class="report-toolbar">
        <div>
            <p class="report-kicker">AgriPlot Reports</p>
            <h1>{% block report_heading %}Report{% endblock %}</h1>
        </div>
        <div class="report-actions">
            <button type="button" class="report-action" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Print
            </button>
            <a class="report-action" href="{% url 'listings:dashboard_router' %}">
                <i class="fa-solid fa-table-columns"></i> Workspace
            </a>
        </div>
    </div>
    <section class="report-content">
        {% block content %}{% endblock %}
    </section>
</main>
{% endblock %}

{% block extra_css %}
{{ block.super }}
<style>
    .report-shell {
        width: var(--ap-page-width);
        margin: 0 auto;
        padding: 28px 0 56px;
    }

    .report-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 22px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--ap-border);
    }

    .report-kicker {
        margin: 0 0 4px;
        color: var(--ap-green);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
    }

    .report-toolbar h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 38px);
    }

    .report-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .report-action {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 13px;
        border: 1px solid var(--ap-border);
        border-radius: 8px;
        background: #fff;
        color: var(--ap-text);
        font-size: 14px;
        font-weight: 700;
    }

    .report-content {
        background: #fff;
        border: 1px solid var(--ap-border);
        border-radius: 8px;
        padding: 26px;
        box-shadow: var(--ap-shadow);
    }

    @media (max-width: 767.98px) {
        .report-shell {
            width: min(100% - 24px, 720px);
            padding-top: 20px;
        }

        .report-toolbar {
            align-items: flex-start;
            flex-direction: column;
        }

        .report-actions,
        .report-action {
            width: 100%;
        }

        .report-action {
            justify-content: center;
        }

        .report-content {
            padding: 18px;
        }
    }

    @media print {
        .ap-topbar,
        .ap-footer,
        .report-actions {
            display: none !important;
        }

        body {
            background: #fff;
        }

        .report-shell,
        .report-content {
            width: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            box-shadow: none;
        }
    }
</style>
{% endblock %}
